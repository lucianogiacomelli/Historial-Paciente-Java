spring.application.name=demo


spring.config.import=optional:file:.env[.properties]

# ============================================
# CONFIGURACIÓN DE BASE DE DATOS PostgreSQL
# ============================================
# Para correr desde el IDE
spring.datasource.url=${SPRING_BD_LOCAL_IDE}
# Para Docker Compose
# spring.datasource.url=${SPRING_DATASOURCE_URL}

# Usuario y contraseńa
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Evita warnings con el nuevo dialecto de Hibernate (Spring Boot 4)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Puerto del servidor Spring Boot
server.port=8080

# ============================================
# Auth0 y CORS
# ============================================

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}
auth0.audience=${AUTH0_AUDIENCE}

auth0.domain=${AUTH0_DOMAIN}
auth0.client-id=${AUTH0_CLIENT_ID}
auth0.client-secret=${AUTH0_CLIENT_SECRET}
auth0.management-audience=${AUTH0_MANAGEMENT_AUDIENCE}

auth0.role-admin=${AUTH0_ROLE_ADMIN}
auth0.role-medico=${AUTH0_ROLE_MEDICO}
auth0.role-recepcionista=${AUTH0_ROLE_RECEPCIONISTA}

web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
