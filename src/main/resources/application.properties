spring.application.name=demo


spring.config.import=optional:file:.env[.properties]

# ============================================
# CONFIGURACI”N DE BASE DE DATOS PostgreSQL
# ============================================
# Para correr desde el IDE
spring.datasource.url=${SPRING_BD_LOCAL_IDE}
# Para Docker Compose
# spring.datasource.url=${SPRING_DATASOURCE_URL}

# Usuario y contraseÒa
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Evita warnings con el nuevo dialecto de Hibernate (Spring Boot 4)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Puerto del servidor Spring Boot
server.port=8080

# ============================================
# Auth0 y CORS
# ============================================

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}
auth0.audience=${AUTH0_AUDIENCE}
web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
